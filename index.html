<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/icons/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-xl">
            <a class="navbar-brand fw-bold" href="#">Crispy Kitchen</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active text-danger" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active px-0 px-lg-4" aria-current="page" href="#">Story</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active px-0 px-lg-4" aria-current="page" href="#">Our Updates</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Contact</a>
                    </li>
                </ul>
                <button class="btn btn-danger px-4" type="submit">Reservation</button>
            </div>
        </div>
    </nav>

    <!-- section-1 -->
    <div class="bg-image">
        <div class="bg-shadow">
            <div class="container-xl py-5">
                <div class="row align-items-center py-4">
                    <div class="col-12 col-lg-5 pb-3 pb-lg-0">
                        <div class="display-1 fw-bold text-white text-center text-lg-start">
                            <div class="row">
                                <div class="col-12 col-md-8 col-lg-6">
                                    Delicious Steaks
                                </div>
                            </div>
                        </div>
                        <div>
                            <div class="d-flex text-white pt-4">
                                <div class="h5">4.4/5</div>
                                <div class="h5 text-warning ps-3">
                                    <i class="bi-star-fill"></i>
                                    <i class="bi-star-fill"></i>
                                    <i class="bi-star-fill"></i>
                                    <i class="bi-star-fill"></i>
                                    <i class="bi-star"></i>
                                </div>
                            </div>
                            <div class="text-light">From <span class="fw-bold text-white">1.206+</span>
                                Customer Reviews</div>
                        </div>
                    </div>
                    <div class="col-12 col-lg-7">
                        <div class="position-relative">
                            <div class="image-container">
                                <img src="09/alex-haney-CAhjZmVk5H4-unsplash.jpg" alt="" class="img-fluid">
                            </div>
                            <div
                                class="h5 text-white position-absolute translate-middle-y top-50 start-0 pt-0 mt-0 pt-lg-5 mt-lg-5 ps-0 ps-lg-3">
                                <div>
                                    Steak <span class="bg-white text-warning rounded-pill py-3 px-2 ms-3">$26.50</span>
                                </div>
                                <div class="d-flex mt-4">
                                    <div class="h5">3.8/5</div>
                                    <div class="h5 text-warning ps-3">
                                        <i class="bi-star-fill"></i>
                                        <i class="bi-star-fill"></i>
                                        <i class="bi-star-fill"></i>
                                        <i class="bi-star"></i>
                                        <i class="bi-star"></i>
                                    </div>
                                </div>
                            </div>
                            <div class="position-absolute bottom-0 end-0">
                                <div class="d-flex">
                                    <div class="bg-warning text-white p-2">
                                        <i class="bi-arrow-up-left"></i>
                                    </div>
                                    <div class="bg-danger text-white p-2">
                                        <i class="bi-arrow-up-right"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
